name: Trigger Dashboard Deploy

on:
  push:
    branches: [main]
    paths:
      - 'VSE_Sprint_Status.json'
      - 'vse-dashboard/index.html'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger boom-master-dashboard deploy
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/cloud-honey/boom-master-dashboard/dispatches \
            -d '{"event_type": "vse-dashboard-update"}'
          echo "Triggered deploy on boom-master-dashboard"
